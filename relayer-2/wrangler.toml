name = "privacy-pool-relayer-2"
main = "src/index.ts"
compatibility_date = "2024-05-01"

[vars]
ALGOD_URL = "https://testnet-api.algonode.cloud"
VERIFIER_APP_ID = "756420114"
BUDGET_HELPER_APP_ID = "756420102"
ALLOWED_POOL_IDS = "756478534,756478549,756480627,756769976,756770804,756811677,756812139,756812509,756812865,756813724"
PLONK_VERIFIER_ADDR = "PBVB7NKXKETOSI4ORWQY7A77PFNRUD4I2PL5L7HZ7EQSHNGIT4R2R6FXFY"

[[kv_namespaces]]
binding = "RELAY_KV"
id = "bfad1480e0524d8abc87cd9f334327a5"
# Create with: wrangler kv namespace create RELAY_KV
# Then paste the id above

# Secrets (set via `wrangler secret put`):
# RELAYER_MNEMONIC — 25-word Algorand mnemonic for this relayer's wallet
# OPERATOR_API_KEY — Bearer token for /api/process-refund (generate with: openssl rand -hex 32)
# ALLOWED_ORIGINS — comma-separated CORS origins (e.g. https://2birds.pages.dev)
# PLONK_VERIFIER_TEAL — base64-encoded compiled PLONK verifier program
# PLONK_VK_HEX — hex-encoded VK bytes for Note field
